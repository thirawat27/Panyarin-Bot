server:
  port: 2333
  address: 0.0.0.0

spring:
  main:
    banner-mode: log
  lavalink:
    server:
      password: "youshallnotpass"
      sources:
        youtube: true
        bandcamp: true
        soundcloud: true
        twitch: true
        vimeo: true
        http: true
        local: false
      bufferDurationMs: 400
      frameBufferDurationMs: 5000
      opusEncodingQuality: 10
      resamplingQuality: LOW
      trackEncodingThreshold: 0.0
      youtubePlaylistLoadLimit: 6
      playerUpdateInterval: 5
      youtubeSearchEnabled: true
      soundcloudSearchEnabled: true
      gc-warnings: true

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/

  level:
    root: INFO
    lavalink: INFO
